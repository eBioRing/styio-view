<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Styio | Ivory Temple Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,200;0,700;1,400&family=JetBrains+Mono:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ivory: #f2efe9;
            --clay: #b25b42;
            --olive: #4a5d4e;
            --charcoal: #2d2d2d;
            --shadow-soft: rgba(0, 0, 0, 0.05);
            --inset-shadow: inset 2px 2px 5px rgba(0,0,0,0.05), inset -2px -2px 5px rgba(255,255,255,0.8);
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body, html { margin: 0; padding: 0; background: var(--ivory); color: var(--charcoal); font-family: 'Crimson Pro', serif; overflow: hidden; height: 100vh; }

        /* 1. 象牙纹理背景 */
        .ivory-table {
            position: fixed; inset: 0; z-index: 1;
            background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png');
            opacity: 0.6;
        }

        /* 2. 核心布局：建筑学层次 */
        .temple-stage {
            position: relative; z-index: 10;
            width: 100vw; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 80px;
        }

        /* 3. 陶瓷编辑器容器 - 凹陷质感 */
        .ceramic-panel {
            width: 100%; max-width: 900px; height: 100%; max-height: 750px;
            background: var(--ivory);
            border-radius: 4px;
            box-shadow: 20px 20px 60px #cecbc6, -20px -20px 60px #ffffff; /* 拟物态悬浮 */
            display: flex; flex-direction: column;
            position: relative;
            transition: all 0.8s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .panel-inner-shadow {
            position: absolute; inset: 20px;
            box-shadow: var(--inset-shadow);
            pointer-events: none;
            border-radius: 2px;
        }

        .panel-head {
            padding: 30px 50px;
            font-size: 11px; font-weight: 700; letter-spacing: 5px;
            text-transform: uppercase; color: var(--olive);
            display: flex; justify-content: space-between;
        }

        .editor-canvas {
            flex: 1; padding: 20px 60px 60px 60px;
            font-family: 'JetBrains Mono', monospace; font-size: 18px; line-height: 2;
            outline: none; color: var(--charcoal); overflow-y: auto;
            /* 细微的纸张压痕感 */
            background-image: repeating-linear-gradient(var(--ivory) 0 35px, #e9e6df 35px 36px);
        }

        /* 4. 离经叛道交互：活扣木栓 (The Peg) */
        .ivory-peg {
            position: fixed; left: 40px; top: 150px;
            width: 40px; height: 40px;
            background: var(--clay);
            box-shadow: 4px 4px 10px rgba(0,0,0,0.2);
            cursor: pointer; z-index: 1001;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .ivory-peg:hover { transform: rotate(45deg) scale(1.1); }
        .ivory-peg::after {
            content: ""; position: absolute; inset: 10px;
            border: 2px solid rgba(255,255,255,0.3);
        }

        .temple-explorer {
            position: fixed; left: -400px; top: 0; bottom: 0; width: 360px;
            background: #ebe8e0;
            border-right: 8px solid var(--clay);
            z-index: 1000; padding: 80px 50px;
            transition: left 0.7s cubic-bezier(0.19, 1, 0.22, 1);
            box-shadow: 20px 0 50px rgba(0,0,0,0.05);
        }
        .is-open .temple-explorer { left: 0; }
        .is-open .ceramic-panel { transform: translateX(200px) scale(0.9); opacity: 0.6; }
        .is-open .ivory-peg { left: 340px; background: var(--olive); }

        /* 5. 视觉模块：沙漏逻辑 (Sand Flow) */
        .sand-timer {
            position: fixed; bottom: 50px; right: 80px;
            width: 100px; height: 100px;
            border: 1px solid var(--olive);
            opacity: 0.3;
        }
        canvas#sandCanvas { width: 100%; height: 100%; }

        /* 代码高亮：陶土色系 */
        .k1 { color: var(--clay); font-weight: 700; }
        .k2 { color: var(--olive); font-style: italic; }

    </style>
</head>
<body>
    <div class="ivory-table"></div>

    <!-- 活扣木栓 -->
    <div class="ivory-peg" onclick="toggleTemple()"></div>

    <!-- 陶土文件舱 -->
    <div class="temple-explorer" id="explorer">
        <div style="font-size: 24px; font-weight: 700; color: var(--clay); margin-bottom: 50px;">Architectural<br/>Index.</div>
        <div style="padding: 15px 0; border-bottom: 1px solid rgba(0,0,0,0.05); cursor:pointer;">01_Foundation.styio</div>
        <div style="padding: 15px 0; border-bottom: 1px solid rgba(0,0,0,0.05); cursor:pointer;">02_Sanctuary.js</div>
        <div style="padding: 15px 0; border-bottom: 1px solid rgba(0,0,0,0.05); cursor:pointer;">03_Epilogue.styio</div>
        <button style="margin-top: 60px; background: var(--charcoal); color: var(--ivory); border:none; padding: 15px; width:100%; font-family: inherit; cursor:pointer;" onclick="toggleTemple()">Return to Temple</button>
    </div>

    <div class="temple-stage">
        <article class="ceramic-panel">
            <div class="panel-inner-shadow"></div>
            <div class="panel-head">
                <span>Styio_Temple // Ivory_Edition</span>
                <span style="opacity: 0.5">Focus_Active</span>
            </div>
            <div class="editor-canvas" contenteditable="true">
<span class="k1">monolith</span> Sanctuary {
  <span class="k2">// Carving logic into the eternal ivory</span>
  <span class="k1">let</span> spirit = <span style="color: var(--charcoal)">Styio</span>.<span class="k1">Breathe</span>();
  
  spirit.<span style="color: var(--charcoal)">meditate</span>({
    purity: <span style="color: var(--clay)">"Absolute"</span>,
    noise: <span style="color: var(--clay)">0.0</span>
  });

  <span class="k1">return</span> spirit.peace;
}
            </div>
        </article>
    </div>

    <!-- 沙漏视觉模块 -->
    <div class="sand-timer">
        <canvas id="sandCanvas"></canvas>
    </div>

    <script>
        function toggleTemple() {
            document.body.classList.toggle('is-open');
        }

        // 沙漏引擎 (Canvas)
        const canvas = document.getElementById('sandCanvas');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = 100;
        let height = canvas.height = 100;

        function drawSand(time) {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = '#4a5d4e';
            
            for(let i=0; i<30; i++) {
                const x = width/2 + Math.sin(time * 0.002 + i) * 30;
                const y = (time * 0.05 + i * 10) % height;
                ctx.fillRect(x, y, 2, 2);
            }
            requestAnimationFrame(drawSand);
        }
        drawSand(0);

        // 点击外部收回
        document.addEventListener('mousedown', (e) => {
            const explorer = document.getElementById('explorer');
            if (document.body.classList.contains('is-open') && !explorer.contains(e.target) && e.target.className !== 'ivory-peg') {
                toggleTemple();
            }
        });
    </script>
</body>
</html>
