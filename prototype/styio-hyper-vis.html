<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Styio | HyperVis v17.0 [EXECUTE_WITH_SOUL]</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600&family=Inter:wght@200;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #f4c76a;
            --gold-50: rgba(244, 199, 106, 0.5);
            --gold-10: rgba(244, 199, 106, 0.1);
            --bg: #020308;
            --surface-panel: rgba(10, 10, 10, 0.98);
            --line-border: rgba(255, 255, 255, 0.08);
            --bio-pink: #ff0055;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; width: 100vw; transition: background 0.5s; }

        .layer-background { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
        .grid-mesh { position: absolute; inset: 0; background-image: linear-gradient(var(--line-border) 1px, transparent 1px), linear-gradient(90deg, var(--line-border) 1px, transparent 1px); background-size: 80px 80px; opacity: 0.2; }
        canvas#topoCanvas { position: absolute; inset: 0; z-index: 5; }

        .stage-viewport {
            position: relative; z-index: 100;
            width: 100vw; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 40px; 
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .editor-shell {
            width: 1400px; max-width: 90vw; 
            height: 800px; max-height: 85vh; 
            background: var(--surface-panel); border: 1px solid var(--line-border);
            display: flex; flex-direction: column; position: relative;
            box-shadow: 0 120px 300px rgba(0,0,0,1); 
            clip-path: polygon(0 0, 98.5% 0, 100% 1.5%, 100% 100%, 1.5% 100%, 0 98.5%);
        }

        .editor-header { height: 60px; border-bottom: 1px solid var(--line-border); display: flex; align-items: center; padding: 0 50px; font-family: 'IBM Plex Mono'; font-size: 11px; letter-spacing: 2px; }
        .project-label { color: var(--gold); font-weight: 700; margin-right: 20px; }
        .file-path { color: rgba(255,255,255,0.2); }

        .editor-content-area { flex: 1; position: relative; display: flex; flex-direction: column; overflow: hidden; }
        .editor-body { flex: 1; padding: 40px 60px; font-family: 'IBM Plex Mono', monospace; font-size: 18px; line-height: 1.8; outline: none; color: rgba(255,255,255,0.9); overflow-y: auto; z-index: 10; }

        .internal-visualizer { height: 60px; border-top: 1px solid rgba(255,255,255,0.03); background: rgba(0,0,0,0.2); position: relative; }
        canvas#pulseCanvas { width: 100%; height: 100%; display: block; }
        .internal-badge { position: absolute; top: 8px; left: 20px; font-size: 8px; color: var(--gold-50); opacity: 0.5; letter-spacing: 2px; }

        .styio-sticker {
            position: fixed; left: 0; width: 140px; height: 34px; background: var(--gold); color: #000;
            display: flex; align-items: center; justify-content: flex-end; padding-right: 20px;
            font-size: 11px; font-weight: 900; letter-spacing: 2px; cursor: pointer; z-index: 1001;
            clip-path: polygon(0% 0%, 90% 0%, 100% 25%, 100% 100%, 0% 100%);
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            margin-left: -55px;
        }
        .styio-sticker:hover { transform: translateX(12px); }

        .styio-panel-left {
            position: fixed; top: 40px; left: -322px; width: 320px; height: calc(100vh - 80px);
            background: var(--surface-panel); border: 1px solid var(--line-border);
            z-index: 1000; transition: left 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            padding: 60px 40px 40px 40px; box-shadow: 20px 0 80px rgba(0,0,0,1);
        }
        
        .is-open-left .styio-panel-left { left: 40px; }
        .is-open-left .active-sticker {
            margin-left: 20px; top: 15px !important; width: 140px; height: 24px;
            background: transparent; color: var(--gold); box-shadow: none; justify-content: flex-start;
            padding-right: 0; padding-left: 10px; clip-path: none; border-left: 2px solid var(--gold);
            pointer-events: none;
        }

        /* --- 书签核心样式：恢复 overflow: visible 确保文字可见 --- */
        .styio-bookmark {
            position: fixed; right: -280px; width: 320px; background: var(--surface-panel);
            border: 1px solid var(--line-border); padding: 30px; z-index: 1000;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: -15px 0 30px rgba(0,0,0,0.6);
            white-space: nowrap; overflow: visible; /* 关键：确保 ::before 可见 */
        }
        .styio-bookmark:hover { right: 0; border-color: var(--gold-50); }
        
        /* 侧边文字手柄：灵魂回归 */
        .styio-bookmark::before {
            position: absolute; left: -32px; top: -1px; bottom: -1px; width: 32px; 
            background: var(--line-border); display: flex; align-items: center; justify-content: center; 
            writing-mode: vertical-rl; font-size: 8px; font-weight: 800; color: var(--gold-50); 
            letter-spacing: 2px; transition: 0.3s;
            content: attr(data-label); border: 1px solid var(--line-border);
        }
        .styio-bookmark:hover::before { background: var(--gold); color: #000; }

        /* --- 特殊修复：满格按钮态依然保留手柄 --- */
        .full-size-action { padding: 0 !important; height: 120px; border-left: none; }
        .btn-trigger { 
            width: 100%; height: 100%; background: var(--gold); color: #000; 
            border: none; font-weight: 900; letter-spacing: 6px; cursor: pointer;
            transition: all 0.2s; display: flex; align-items: center; justify-content: center;
        }
        .btn-trigger:active { background: #fff; transform: scale(0.98); }
        .btn-trigger:hover { filter: brightness(1.1); }

        .keyword { color: var(--gold); font-weight: 600; cursor: pointer; position: relative; }
        body.is-turbulent .editor-shell { border-color: var(--bio-pink); box-shadow: 0 0 100px rgba(255, 0, 85, 0.4); }

    </style>
</head>
<body>
    <div class="layer-background">
        <div class="grid-mesh"></div>
        <canvas id="topoCanvas"></canvas>
    </div>

    <div class="stage-viewport" id="mainStage">
        <article class="editor-shell">
            <header class="editor-header">
                <span class="project-label">PROJECT: EXECUTE_STABILIZED</span>
                <span class="file-path">PATH://STYIO/UI/V17.0_FINAL_LOCK.STYIO</span>
            </header>

            <div class="editor-content-area">
                <div class="editor-body" id="editor" contenteditable="true" spellcheck="false" onmouseup="triggerTopo(event)">
<span class="keyword">fn</span> <span style="color:#fff">ignite_with_label</span>() {
  <span style="color: rgba(255,255,255,0.3)">// Handle text "CORE_EXECUTE" restored.</span>
  <span style="color: rgba(255,255,255,0.3)">// Full-bleed button remains active.</span>
  
  <span class="keyword">let</span> sequence = <span style="color:#fff">Styio</span>.<span class="keyword">System</span>({
    handle: <span style="color: var(--gold)">"CORE_EXECUTE"</span>,
    action: <span style="color: var(--gold)">"FULL_FILL"</span>
  });

  <span class="keyword">return</span> sequence.SUCCESS;
}
                </div>
                <footer class="internal-visualizer">
                    <span class="internal-badge" id="waveLabel">VIS_BRIDGE: CONNECTED</span>
                    <canvas id="pulseCanvas"></canvas>
                </footer>
            </div>
        </article>
    </div>

    <div id="left-stickers-container"></div>
    <div id="right-bookmarks-container"></div>

    <script>
        const LEFT_DOCK_REGISTRY = [{ id: 'files', label: 'FILES', top: '80px', content: `<div style="font-size: 10px; opacity: 0.3; margin-bottom: 40px; letter-spacing: 5px;">HULL_FS_v2.8</div><div style="padding: 10px 0; cursor:pointer;">:: main.styio</div><div style="padding: 10px 0; color:var(--gold); cursor:pointer;">:: final_soul.js</div>` }];
        
        const RIGHT_DOCK_REGISTRY = [
            { id: 'density', label: 'DATA_DENSITY', top: '80px', html: `<div style="font-size:9px; color:var(--gold-50); margin-bottom:10px;">Data Density</div><div style="font-family:'IBM Plex Mono'; font-size:24px; color:var(--gold);" id="valDensity">0.9842</div>` },
            { id: 'entropy', label: 'SYS_ENTROPY', top: '220px', html: `<div style="font-size:9px; color:var(--gold-50); margin-bottom:10px;">System Entropy</div><div style="font-family:'IBM Plex Mono'; font-size:24px; color:var(--gold);">0.0014</div>` },
            { id: 'execute', label: 'CORE_EXECUTE', bottom: '80px', isFullSize: true, html: `<button class="btn-trigger" onclick="handleExecute()">EXECUTE</button>` }
        ];

        function renderCollections() {
            const leftContainer = document.getElementById('left-stickers-container');
            leftContainer.innerHTML = LEFT_DOCK_REGISTRY.map(comp => `
                <div class="styio-panel-left" id="panel-${comp.id}">
                    <div class="styio-sticker" id="sticker-${comp.id}" style="top: ${comp.top}" onclick="toggleLeftComponent('${comp.id}')">${comp.label}</div>
                    <div class="explorer-content" style="transition: opacity 0.4s 0.3s; opacity: 0;">${comp.content}</div>
                </div>`).join('');
            
            const rightContainer = document.getElementById('right-bookmarks-container');
            rightContainer.innerHTML = RIGHT_DOCK_REGISTRY.map(comp => `
                <div class="styio-bookmark ${comp.isFullSize ? 'full-size-action' : ''}" data-label="${comp.label}" style="${comp.top ? 'top:'+comp.top : 'bottom:'+comp.bottom}">
                    ${comp.html}
                </div>`).join('');
        }

        function handleExecute() {
            alert('SYSTEM_READY // 核心引擎正在启动...');
        }

        function toggleLeftComponent(id) {
            const panel = document.getElementById(`panel-${id}`);
            const sticker = document.getElementById(`sticker-${id}`);
            const main = document.getElementById('mainStage');
            const isOpen = document.body.classList.toggle('is-open-left');
            if(isOpen) { sticker.classList.add('active-sticker'); panel.querySelector('.explorer-content').style.opacity = '1'; main.style.transform = 'translateX(40px) scale(0.98)'; main.style.opacity = '0.5'; }
            else { sticker.classList.remove('active-sticker'); panel.querySelector('.explorer-content').style.opacity = '0'; main.style.transform = 'translateX(0) scale(1)'; main.style.opacity = '1'; }
        }

        let bridgeParams = { complexity: 0, flow: 1.0, isPain: false };
        window.StyioBridge = {
            update: function(c, f, p) {
                bridgeParams.complexity = c; bridgeParams.flow = f; bridgeParams.isPain = p;
                const label = document.getElementById('waveLabel');
                if(p) { label.innerText = "VIS_BRIDGE: CRITICAL"; document.body.classList.add('is-turbulent'); }
                else { document.body.classList.remove('is-turbulent'); label.innerText = c > 0.6 ? "VIS_BRIDGE: COMPLEX" : "VIS_BRIDGE: OPTIMAL"; }
            }
        };

        const editor = document.getElementById('editor');
        editor.addEventListener('input', () => {
            const text = editor.innerText;
            const c = Math.min((text.match(/\b(if|else|while|for|switch|catch)\b/g) || []).length / 5, 1.0);
            const f = Math.min((text.match(/\b(pipe|map|sync|async|let|const)\b/g) || []).length / 5, 1.0);
            window.StyioBridge.update(c, f, text.includes("error") || text.includes("fail"));
        });

        const topoCanvas = document.getElementById('topoCanvas');
        const tCtx = topoCanvas.getContext('2d');
        const pulseCanvas = document.getElementById('pulseCanvas');
        const pCtx = pulseCanvas.getContext('2d');
        let tW, tH, pW, pH, activeBeams = [];

        function resize() {
            tW = topoCanvas.width = window.innerWidth; tH = topoCanvas.height = window.innerHeight;
            pW = pulseCanvas.width = pulseCanvas.parentElement.offsetWidth; pH = pulseCanvas.height = pulseCanvas.parentElement.offsetHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function triggerTopo(e) {
            if(e.target.classList.contains('keyword') || window.getSelection().toString()) {
                for(let i=0; i<15; i++) activeBeams.push({ startX: e.clientX, startY: e.clientY, endX: Math.round(Math.random() * tW / 80) * 80, endY: Math.round(Math.random() * tH / 80) * 80, life: 1.0 });
            }
        }

        let actualTurbulence = 0;
        function draw(time) {
            tCtx.clearRect(0, 0, tW, tH);
            activeBeams = activeBeams.filter(b => b.life > 0);
            activeBeams.forEach(b => { tCtx.beginPath(); tCtx.strokeStyle = `rgba(244, 199, 106, ${b.life * 0.2})`; tCtx.lineWidth = 0.5; tCtx.moveTo(b.startX, b.startY); tCtx.lineTo(b.endX, b.endY); tCtx.stroke(); b.life -= 0.02; });
            pCtx.clearRect(0, 0, pW, pH);
            actualTurbulence += ((bridgeParams.complexity * 1.5 - bridgeParams.flow * 0.8) - actualTurbulence) * 0.05;
            pCtx.beginPath(); pCtx.strokeStyle = bridgeParams.isPain ? '#ff0055' : 'rgba(244, 199, 106, 0.4)'; pCtx.lineWidth = 1.5; pCtx.moveTo(0, pH/2);
            for(let x=0; x<pW; x+=4) { pCtx.lineTo(x, pH/2 + Math.sin(x*0.02 + time*0.004) * (10 + actualTurbulence * 25)); }
            pCtx.stroke();
            document.getElementById('valDensity').innerText = (0.98 + Math.random() * 0.01).toFixed(4);
            requestAnimationFrame(draw);
        }

        renderCollections();
        resize();
        draw(0);

        document.addEventListener('mousedown', (e) => {
            const explorer = document.querySelector('.styio-panel-left');
            if (document.body.classList.contains('is-open-left') && !explorer.contains(e.target) && e.target.className !== 'styio-sticker') toggleLeftComponent('files');
        });
    </script>
</body>
</html>
