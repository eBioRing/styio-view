<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Styio | Synapse Cockpit Edition [RESTORED]</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;700&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --nexus-glow: #00d2ff;
            --nexus-deep: #000814;
            --bio-pink: #ff0055;
            --cockpit-bg: rgba(5, 12, 25, 0.9);
            --glass-edge: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body, html { margin: 0; padding: 0; background: var(--nexus-deep); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; height: 100vh; width: 100vw; }

        canvas#nexusBg { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

        .neural-stage {
            position: relative; z-index: 10; width: 100vw; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            perspective: 1000px;
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* --- 核心回归：太空舱指挥窗 --- */
        .cockpit-window {
            width: 900px; height: 600px;
            background: var(--cockpit-bg);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-edge);
            border-radius: 40px; /* 大圆角回归 */
            position: relative;
            display: flex; flex-direction: column;
            box-shadow: 
                0 50px 100px rgba(0,0,0,0.8),
                inset 0 0 40px rgba(0, 210, 255, 0.05); /* 内部微弱辉光 */
            overflow: hidden;
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .window-head {
            padding: 20px 40px; border-bottom: 1px solid var(--glass-edge);
            display: flex; justify-content: space-between;
            font-size: 10px; letter-spacing: 5px; opacity: 0.4;
        }

        .editor-canvas {
            flex: 1; padding: 50px 60px;
            font-family: 'JetBrains Mono', monospace; font-size: 18px; line-height: 1.8;
            outline: none; color: rgba(255,255,255,0.9);
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.2);
            overflow-y: auto;
        }

        /* --- 底部横向生物光纤 --- */
        .bio-rail-container {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 400px; height: 40px;
            cursor: pointer; z-index: 1001;
            display: flex; align-items: center; justify-content: center;
        }
        .fiber-horizontal {
            width: 240px; height: 3px; 
            background: linear-gradient(90deg, transparent, var(--bio-pink), #fff, var(--bio-pink), transparent);
            box-shadow: 0 0 25px var(--bio-pink);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            border-radius: 10px;
            position: relative; overflow: hidden;
        }
        .fiber-horizontal::after {
            content: ""; position: absolute; inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
            transform: translateX(-100%);
            animation: flow-sync 3s infinite;
        }
        @keyframes flow-sync { 100% { transform: translateX(100%); } }

        .is-open .cockpit-window {
            transform: translateY(-150px) scale(0.9);
            opacity: 0.3;
        }

        /* 突触文件分支 */
        .synapse-branches {
            position: fixed; bottom: -600px; left: 0; right: 0; height: 400px;
            background: radial-gradient(circle at center top, rgba(255, 0, 85, 0.15) 0%, transparent 80%);
            z-index: 1000; display: flex; flex-direction: row; justify-content: center; align-items: center;
            padding: 50px; transition: all 0.8s cubic-bezier(0.17, 0.84, 0.44, 1);
            gap: 60px; pointer-events: none;
        }
        .is-open .synapse-branches { bottom: 0; pointer-events: auto; }

        .branch-item {
            font-size: 20px; font-weight: 200; color: var(--bio-pink);
            cursor: pointer; transition: 0.3s;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
        .branch-item:hover { color: #fff; text-shadow: 0 0 20px var(--bio-pink); transform: scale(1.1); }

    </style>
</head>
<body>
    <canvas id="nexusBg"></canvas>

    <div class="bio-rail-container" id="rail" onclick="toggleNexus()">
        <div class="fiber-horizontal"></div>
    </div>

    <div class="synapse-branches" id="branches">
        <div class="branch-item" onclick="toggleNexus()">Neural_Navigator</div>
        <div class="branch-item" onclick="toggleNexus()">System_Flux</div>
        <div class="branch-item" onclick="toggleNexus()">Styio_Core</div>
    </div>

    <div class="neural-stage">
        <!-- 太空舱视窗编辑器 -->
        <main class="cockpit-window">
            <div class="window-head">
                <span>STYO_STATION // COCKPIT_HUD_v2.0</span>
                <span style="color: var(--nexus-glow)">STATUS: STABLE</span>
            </div>
            <div class="editor-canvas" contenteditable="true">
// Cockpit geometry restored.
// Deep space immersion active.
fn navigate_nebula() {
  let ship = Styio.Vessel();
  
  ship.on_ignite(() => {
    hull.reinforce(0.9);
    visualizer.sync_background();
  });
  
  return ship.status;
}
            </div>
        </main>
    </div>

    <script>
        const canvas = document.getElementById('nexusBg');
        const ctx = canvas.getContext('2d');
        let width, height;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function toggleNexus() {
            document.body.classList.toggle('is-open');
        }

        // 背景神经网格动效
        let mouse = {x: width/2, y: height/2};
        document.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX; mouse.y = e.clientY;
        });

        function drawNexus(time) {
            ctx.clearRect(0, 0, width, height);
            ctx.strokeStyle = 'rgba(0, 210, 255, 0.08)';
            ctx.lineWidth = 1;
            const gap = 100;
            for(let x=0; x<width; x+=gap) {
                for(let y=0; y<height; y+=gap) {
                    const dx = mouse.x - x;
                    const dy = mouse.y - y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    const force = Math.max(0, (300 - dist) / 300);
                    ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x + dx * force * 0.5, y + dy * force * 0.5); ctx.stroke();
                }
            }
            requestAnimationFrame(drawNexus);
        }
        drawNexus(0);

        canvas.addEventListener('click', (e) => {
            if(document.body.classList.contains('is-open') && e.target.id === 'nexusBg') toggleNexus();
        });
    </script>
</body>
</html>
