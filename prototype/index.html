<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Styio | Design Gallery v8.0 [TRUE_PREVIEW]</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;800&family=Azeret+Mono:wght@200;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030303;
            --accent: #fff;
            --card-border: rgba(255,255,255,0.05);
            --panel-bg: #0a0a0a;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }

        .gallery-container { 
            max-width: 1600px; margin: 0 auto; padding: 100px 60px;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.6s;
        }

        header { margin-bottom: 100px; text-align: left; border-left: 2px solid #fff; padding-left: 40px; }
        .gallery-title { font-size: 64px; font-weight: 800; letter-spacing: -3px; line-height: 0.9; margin: 0; }

        /* 1. 侧边拉环 */
        .console-trigger {
            position: fixed; left: 0; top: 0; bottom: 0; width: 10px;
            background: transparent; cursor: pointer; z-index: 2000;
            transition: width 0.3s;
        }
        .console-trigger:hover { width: 30px; background: rgba(255,255,255,0.1); }

        /* 2. 导演控制台 */
        .director-console {
            position: fixed; left: -380px; top: 0; bottom: 0; width: 360px;
            background: var(--panel-bg); border-right: 1px solid var(--card-border);
            z-index: 2100; padding: 60px 40px;
            transition: left 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .is-open .director-console { left: 0; }
        .is-open .gallery-container { transform: translateX(100px) scale(0.98); opacity: 0.2; pointer-events: none; }

        .sort-item {
            background: #111; border: 1px solid #222;
            padding: 15px 20px; margin-bottom: 10px;
            cursor: grab; display: flex; align-items: center; justify-content: space-between;
            font-family: 'Azeret Mono'; font-size: 11px;
        }
        .sort-item:active { cursor: grabbing; background: #fff; color: #000; }

        /* 3. 画廊网格与卡片 */
        .prototype-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); gap: 40px;
        }

        .proto-card {
            position: relative; min-height: 520px;
            border: 1px solid var(--card-border);
            text-decoration: none; color: inherit;
            display: flex; flex-direction: column;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            background: rgba(255,255,255,0.01);
            overflow: hidden;
        }
        .proto-card:hover { transform: translateY(-15px); border-color: #fff; background: rgba(255,255,255,0.03); }

        /* --- 真实风格预览引擎 --- */
        .preview-pane {
            height: 260px; width: 100%;
            position: relative; overflow: hidden;
            background: #000; border-bottom: 1px solid var(--card-border);
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .proto-card:hover .preview-pane { transform: scale(1.05); }

        /* 主题特定模拟：Xenon */
        .style-xenon { background: #050505; }
        .style-xenon::after { content: ""; position: absolute; left: 10px; top: 20%; bottom: 20%; width: 2px; background: #00f2ff; box-shadow: 0 0 15px #00f2ff; animation: xenon-drag 2s infinite alternate; }
        @keyframes xenon-drag { 0% { top: 10%; } 100% { top: 60%; } }

        /* 主题特定模拟：Zenith */
        .style-zenith { background: #161616; }
        .style-zenith::after { content: ""; position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 80px; height: 15px; background: #333; border-radius: 0 0 10px 10px; border: 1px solid #444; transition: 0.3s; }
        .proto-card:hover .style-zenith::after { transform: translateX(-50%) translateY(20px); }

        /* 主题特定模拟：Synapse */
        .style-synapse { background: #000814; }
        .style-synapse::before { content: ""; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 60px; height: 60px; background: rgba(0, 210, 255, 0.05); border: 1px solid #00d2ff; border-radius: 50% 50% 30% 30%; }
        .style-synapse::after { content: ""; position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); width: 120px; height: 2px; background: #ff0055; box-shadow: 0 0 15px #ff0055; }

        /* 主题特定模拟：Bauhaus */
        .style-bauhaus { background: #e5e5e5; }
        .style-bauhaus::before { content: ""; position: absolute; left: 0; width: 40px; height: 100%; background: #0044cc; }
        .style-bauhaus::after { content: ""; position: absolute; bottom: 20px; right: 20px; width: 60px; height: 60px; background: #e02020; }

        /* 主题特定模拟：Cinema */
        .style-cinema { background: #111; }
        .style-cinema::after { content: ""; position: absolute; inset: 0; background: repeating-linear-gradient(0deg, rgba(255,255,255,0.03) 0 1px, transparent 1px 2px); animation: cinema-flicker 0.1s infinite; }
        @keyframes cinema-flicker { 50% { opacity: 0.5; } }

        /* 主题特定模拟：Ivory */
        .style-ivory { background: #f2efe9; }
        .style-ivory::after { content: ""; position: absolute; inset: 40px; border-radius: 4px; box-shadow: inset 4px 4px 10px rgba(0,0,0,0.05), inset -4px -4px 10px #fff; }

        /* 信息排版 */
        .card-body { padding: 40px; display: flex; flex-direction: column; flex: 1; position: relative; z-index: 10; background: inherit; }
        .proto-index { font-family: 'Azeret Mono'; font-size: 11px; font-weight: 700; opacity: 0.2; margin-bottom: 20px; }
        .proto-name { font-size: 32px; font-weight: 800; letter-spacing: -1px; margin-bottom: 15px; }
        .proto-desc { font-size: 15px; opacity: 0.4; line-height: 1.6; }
        .proto-tag { font-family: 'Azeret Mono'; font-size: 9px; letter-spacing: 3px; text-transform: uppercase; margin-top: auto; padding-top: 40px; opacity: 0.3; }

        .vignette { position: fixed; inset: 0; pointer-events: none; background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.7) 100%); z-index: 100; }
        footer { margin-top: 150px; text-align: left; font-size: 10px; opacity: 0.1; letter-spacing: 10px; padding-bottom: 80px; }
    </style>
</head>
<body>
    <div class="vignette"></div>

    <div class="console-trigger" onclick="toggleConsole()"></div>

    <div class="director-console" id="console">
        <div style="font-size: 10px; letter-spacing: 8px; opacity: 0.3; margin-bottom: 40px;">DIRECTOR_CONTROL</div>
        <div id="sortList"></div>
        <button style="margin-top: auto; background: transparent; border: 1px solid #444; color: #666; padding: 15px; font-size: 10px; letter-spacing: 4px; cursor:pointer;" onclick="toggleConsole()">CLOSE_CONSOLE</button>
    </div>

    <div class="gallery-container" id="main">
        <header>
            <h1>Design Repository</h1>
            <div class="gallery-title">Styio<br/>Prototype<br/>Nexus</div>
        </header>
        <div class="prototype-grid" id="protoGrid"></div>
        <footer>BEYOND CONVENTIONAL INTERFACES // STYIO AI PROJECT 2026</footer>
    </div>

    <script>
        const prototypes = [
            { id: 'zenith', name: 'Zenith', styleClass: 'style-zenith', url: 'styio-zenith.html', desc: '垂直权威。顶部拉幕全景菜单，哑光石墨美学，极致掌控感。', tag: 'Vertical_Authority' },
            { id: 'xenon', name: 'Xenon', styleClass: 'style-xenon', url: 'styio-xenon.html', desc: '氙气实验室。边框光纤实时跟随光标高度，高对比度护眼设计。', tag: 'Lab_Precision' },
            { id: 'vis', name: 'HyperVis', styleClass: 'style-xenon', url: 'styio-hyper-vis.html', desc: '战术 HUD。60FPS 实时逻辑脉冲，磁吸式书签变标题交互。', tag: 'Tactical_HUD' },
            { id: 'bauhaus', name: 'Bauhaus', styleClass: 'style-bauhaus', url: 'styio-bauhaus.html', desc: '绝对几何。包豪斯风格非对称网格系统，模块化推移交互。', tag: 'Functional_Fashion' },
            { id: 'synapse-v2', name: 'Synapse v2', styleClass: 'style-synapse', url: 'styio-synapse-v2.html', desc: '触控板专业版。双指横向轻扫切换，发光缩进导轨支持。', tag: 'Pro_Enhanced' },
            { id: 'ivory', name: 'Ivory', styleClass: 'style-ivory', url: 'styio-glace.html', desc: '象牙神庙。拟物陶瓷质感，内凹阴影建筑学，温润大地色系。', tag: 'Tactile_Light' },
            { id: 'obsidian', name: 'Obsidian', styleClass: 'style-xenon', url: 'styio-obsidian.html', desc: '黑曜石精密。绝对直角，数据层级叠加，工业级实用主义工具。', tag: 'Precision_Pro' },
            { id: 'synapse', name: 'Neural', styleClass: 'style-synapse', url: 'styio-synapse.html', desc: '神经元。横向生物光纤导轨，底部升起式节点，莱洛核心进化。', tag: 'Bio_Organic' },
            { id: 'monolith', name: 'Monolith', styleClass: 'style-xenon', url: 'styio-monolith.html', desc: '黑色方碑。垂直崇高美学，发光几何底座生长，3D 视差。', tag: 'Void_Study' },
            { id: 'lumina', name: 'Lumina', styleClass: 'style-xenon', url: 'styio-lumina.html', desc: '光学棱镜。超折射玻璃材质，RGB 棱镜色散，极光背景。', tag: 'Optical_Art' },
            { id: 'parchment', name: 'Parchment', styleClass: 'style-ivory', url: 'styio-parchment.html', desc: '手稿。羊皮纸纹理，红色蜡封火漆章交互，墨水洇散排版。', tag: 'Vintage_Art' },
            { id: 'cinema', name: 'Cinema', styleClass: 'style-cinema', url: 'styio-cinema.html', desc: '电影放映机。黑白映画，动态卷轴与光束，导演剪辑版 v2。', tag: 'Noir_Steady' }
        ];

        let currentOrder = [];
        function loadOrder() {
            const saved = JSON.parse(localStorage.getItem('styio_nexus_order') || '[]');
            if(saved.length > 0) {
                currentOrder = saved.map(id => prototypes.find(p => p.id === id)).filter(Boolean);
                prototypes.forEach(p => { if(!saved.includes(p.id)) currentOrder.push(p); });
            } else { currentOrder = [...prototypes]; }
        }

        function saveOrder() {
            const ids = Array.from(document.querySelectorAll('.sort-item')).map(item => item.dataset.id);
            localStorage.setItem('styio_nexus_order', JSON.stringify(ids));
            loadOrder(); renderMain();
        }

        function toggleConsole() { document.body.classList.toggle('is-open'); }

        function renderConsole() {
            const list = document.getElementById('sortList');
            list.innerHTML = currentOrder.map(p => `<div class="sort-item" draggable="true" data-id="${p.id}"><span>${p.name}</span><span style="opacity:0.1;">:::</span></div>`).join('');
            addDragListeners();
        }

        function renderMain() {
            const grid = document.getElementById('protoGrid');
            grid.innerHTML = currentOrder.map((p, idx) => `
                <a href="${p.url}" class="proto-card" data-id="${p.id}">
                    <div class="preview-pane ${p.styleClass}"></div>
                    <div class="card-body">
                        <span class="proto-index">${String(idx + 1).padStart(2, '0')}</span>
                        <div class="proto-name">${p.name}</div>
                        <div class="proto-desc">${p.desc}</div>
                        <div class="proto-tag">${p.tag}</div>
                    </div>
                </a>
            `).join('');
        }

        function addDragListeners() {
            const container = document.getElementById('sortList');
            document.querySelectorAll('.sort-item').forEach(item => {
                item.addEventListener('dragstart', () => item.classList.add('dragging-item'));
                item.addEventListener('dragend', () => { item.classList.remove('dragging-item'); saveOrder(); });
            });
            container.addEventListener('dragover', e => {
                e.preventDefault();
                const afterElement = getDragAfterElement(container, e.clientY);
                const dragging = document.querySelector('.dragging-item');
                if (afterElement == null) container.appendChild(dragging); else container.insertBefore(dragging, afterElement);
            });
        }

        function getDragAfterElement(container, y) {
            const draggableElements = [...container.querySelectorAll('.sort-item:not(.dragging-item)')];
            return draggableElements.reduce((closest, child) => {
                const box = child.getBoundingClientRect();
                const offset = y - box.top - box.height / 2;
                if (offset < 0 && offset > closest.offset) return { offset: offset, element: child };
                else return closest;
            }, { offset: Number.NEGATIVE_INFINITY }).element;
        }

        loadOrder(); renderConsole(); renderMain();

        document.addEventListener('mousedown', (e) => {
            const con = document.getElementById('console');
            if (document.body.classList.contains('is-open') && !con.contains(e.target) && e.target.className !== 'console-trigger') toggleConsole();
        });
    </script>
</body>
</html>
