<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Styio | Synapse v2 Trackpad Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Azeret+Mono:wght@200;400&family=Quicksand:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --nexus-glow: #00d2ff;
            --nexus-deep: #000814;
            --bio-pink: #ff0055;
            --text-bio: rgba(255, 255, 255, 0.9);
            --indent-line: rgba(0, 210, 255, 0.15);
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body, html { margin: 0; padding: 0; background: var(--nexus-deep); color: #fff; font-family: 'Quicksand', sans-serif; overflow: hidden; height: 100vh; width: 100vw; }

        canvas#nexusBg { position: fixed; inset: 0; z-index: 1; }

        .neural-stage {
            position: relative; z-index: 10; width: 100vw; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* 神经元编辑器 - 增加专业缩进支持 */
        .neuron-editor {
            width: 850px; padding: 60px 80px;
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(15px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .editor-content {
            font-family: 'Azeret Mono', monospace; font-size: 16px; line-height: 2;
            outline: none; color: var(--text-bio);
            white-space: pre;
            text-align: left; /* 恢复左对齐以支持缩进 */
        }

        /* 生物发光缩进线 */
        .indent-guide {
            position: relative;
            padding-left: 30px;
            border-left: 1px solid var(--indent-line);
            margin-left: 10px;
        }
        .indent-guide:hover { border-left-color: var(--nexus-glow); box-shadow: -10px 0 20px rgba(0, 210, 255, 0.05); }

        /* 触发器：红光细丝 */
        .bio-trigger {
            position: fixed; left: 0; top: 0; bottom: 0; width: 60px;
            cursor: pointer; z-index: 1001;
            display: flex; align-items: center; justify-content: center;
        }
        .fiber {
            width: 2px; height: 150px; background: var(--bio-pink);
            box-shadow: 0 0 25px var(--bio-pink);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .bio-trigger:hover .fiber { height: 250px; width: 4px; filter: brightness(1.3); }

        /* 侧边栏：突触分支 */
        .synapse-panel {
            position: fixed; left: -400px; top: 0; bottom: 0; width: 400px;
            background: rgba(0, 8, 20, 0.95);
            border-right: 1px solid rgba(255, 0, 85, 0.2);
            z-index: 1000; display: flex; flex-direction: column; justify-content: center;
            padding: 80px; transition: left 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .is-open .synapse-panel { left: 0; }
        .is-open .neural-stage { transform: translateX(200px) scale(0.95); opacity: 0.4; pointer-events: none; }

        .branch-node {
            font-size: 22px; font-weight: 200; color: var(--bio-pink);
            margin: 15px 0; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; gap: 15px;
            opacity: 0.5;
        }
        .branch-node:hover { opacity: 1; transform: translateX(20px); }
        .branch-node.active { opacity: 1; font-weight: 700; }

        /* 状态指示 */
        .status-pill {
            position: absolute; bottom: 20px; right: 40px;
            font-size: 9px; letter-spacing: 3px; color: var(--nexus-glow);
            opacity: 0.4;
        }

    </style>
</head>
<body class="v2-engine">
    <canvas id="nexusBg"></canvas>

    <!-- 点击/滑动触发器 -->
    <div class="bio-trigger" id="trigger" onclick="toggleNexus()">
        <div class="fiber"></div>
    </div>

    <div class="synapse-panel" id="panel">
        <div style="font-size: 10px; letter-spacing: 5px; opacity: 0.3; margin-bottom: 40px; color: var(--bio-pink);">TRACKPAD_MODE_ACTIVE</div>
        <div class="branch-node active">Synthesizer.styio</div>
        <div class="branch-node">Neural_Drive.js</div>
        <div class="branch-node">Prism_Mirror.styio</div>
        <div style="margin-top: 50px; font-size: 11px; opacity: 0.2;">SWIPE_LEFT_TO_CLOSE</div>
    </div>

    <div class="neural-stage" id="stage">
        <div class="neuron-editor">
            <div class="editor-content" contenteditable="true">
<span style="color: var(--bio-pink)">class</span> Consciousness {
  <span style="color: var(--nexus-glow)">constructor</span>() {
    <div class="indent-guide">this.state = <span style="color: var(--nexus-glow)">"AWAKE"</span>;
this.energy = 1.0;</div>
  }

  <span style="color: var(--bio-pink)">async</span> pulse() {
    <div class="indent-guide">await this.sync();
<span style="color: var(--bio-pink)">return</span> <span style="color: var(--nexus-glow)">"NEURAL_EMISSION"</span>;</div>
  }
}
            </div>
            <div class="status-pill">DENSITY: 0.942 // SYNAPSE_V2</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('nexusBg');
        const ctx = canvas.getContext('2d');
        const panel = document.getElementById('panel');
        const stage = document.getElementById('stage');
        let width, height;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // 1. 点击触发逻辑
        function toggleNexus() {
            document.body.classList.toggle('is-open');
        }

        // 2. 核心交互：触摸板横向轻扫逻辑
        let swipeThreshold = 50;
        let accumX = 0;

        window.addEventListener('wheel', (e) => {
            // 只响应横向滚动 (deltaX)
            if (Math.abs(e.deltaX) > Math.abs(e.deltaY)) {
                accumX += e.deltaX;
                
                // 向右扫 (deltaX < 0) -> 呼出
                if (accumX < -swipeThreshold) {
                    document.body.classList.add('is-open');
                    accumX = 0;
                }
                // 向左扫 (deltaX > 0) -> 收回
                if (accumX > swipeThreshold) {
                    document.body.classList.remove('is-open');
                    accumX = 0;
                }
            } else {
                accumX = 0;
            }
        }, { passive: true });

        // 3. 点击背景收回
        canvas.addEventListener('click', () => {
            document.body.classList.remove('is-open');
        });

        // 背景网格动效保持
        let mouse = {x: width/2, y: height/2};
        document.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX; mouse.y = e.clientY;
        });

        function draw(time) {
            ctx.clearRect(0, 0, width, height);
            ctx.strokeStyle = 'rgba(0, 210, 255, 0.1)';
            const gap = 100;
            for(let x=0; x<width; x+=gap) {
                for(let y=0; y<height; y+=gap) {
                    const dx = mouse.x - x;
                    const dy = mouse.y - y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    const force = Math.max(0, (300 - dist) / 300);
                    ctx.beginPath();
                    ctx.moveTo(x, y);
                    ctx.lineTo(x + dx * force * 0.4, y + dy * force * 0.4);
                    ctx.stroke();
                }
            }
            requestAnimationFrame(draw);
        }
        draw(0);
    </script>
</body>
</html>
