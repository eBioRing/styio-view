name: repo-hygiene

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hygiene:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout styio-view
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          path: styio-view

      - name: Check out styio-nightly sibling repository
        uses: actions/checkout@v5
        with:
          repository: Unka-Malloc/styio-nightly
          path: styio-nightly

      - name: Check out styio-spio sibling repository
        uses: actions/checkout@v5
        with:
          repository: Unka-Malloc/styio-spio
          path: styio-spio

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Check tracked tree
        working-directory: styio-view
        run: python3 scripts/repo-hygiene-gate.py --mode tracked

      - name: Check ecosystem CLI doc consistency
        working-directory: styio-view
        run: python3 scripts/ecosystem-cli-doc-gate.py --require-workspace --json

      - name: Check incoming history range
        shell: bash
        working-directory: styio-view
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            RANGE="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          elif [[ "${{ github.event.before }}" == "0000000000000000000000000000000000000000" ]]; then
            RANGE="HEAD"
          else
            RANGE="${{ github.event.before }}..${{ github.sha }}"
          fi
          python3 scripts/repo-hygiene-gate.py --mode push --range "$RANGE"
