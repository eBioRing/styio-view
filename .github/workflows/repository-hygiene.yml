name: Repository Hygiene Gate

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  guard-repository-hygiene:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Reject generated artifacts and unexpected binaries
        run: python3 scripts/check_repo_hygiene.py
