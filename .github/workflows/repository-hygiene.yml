name: Repository Hygiene Gate

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  guard-repository-hygiene:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          path: styio-view

      - name: Check out styio-nightly sibling repository
        uses: actions/checkout@v4
        with:
          repository: Unka-Malloc/styio-nightly
          path: styio-nightly

      - name: Check out styio-spio sibling repository
        uses: actions/checkout@v4
        with:
          repository: Unka-Malloc/styio-spio
          path: styio-spio

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Reject generated artifacts and unexpected binaries
        working-directory: styio-view
        run: python3 scripts/check_repo_hygiene.py

      - name: Validate ecosystem CLI doc consistency when sibling repos are present
        working-directory: styio-view
        run: python3 scripts/ecosystem-cli-doc-gate.py --require-workspace --json
